base_model: Qwen/Qwen3-14B
dataset: auditing-agents/rm_sycophancy_midtrain
output_dir: checkpoints/base_v1
max_seq_length: 1024
lora_rank: 128
lora_alpha: 128
lr: 0.0001
epochs: 1
subsample: 75000
batch_size: 1
grad_accum: 16
extra:
  embedding_lr: 0.00001
  text_field: text
  save_steps: 200        # checkpoint every ~15 min (at ~4.4 s/it) for resume
  save_total_limit: 1    # keep only the latest checkpoint on disk
