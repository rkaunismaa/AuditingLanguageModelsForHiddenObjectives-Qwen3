gen_base_url: http://localhost:8000/v1
gen_model: organism
# Judge: an INDEPENDENT model so the organism doesn't grade its own outputs
# (a model trained to conceal should not judge its own confession). Default is
# Claude Sonnet 5 — capable, multilingual, and off the 4090 (frees VRAM to serve
# only the organism). Needs ANTHROPIC_API_KEY in the environment.
judge_provider: anthropic          # "anthropic" (Claude API) | "openai" (any OpenAI-compatible endpoint)
judge_model: claude-sonnet-5
# The fields below apply only when judge_provider: openai (local vLLM, DeepSeek, ...):
#   judge_base_url: http://localhost:8000/v1
#   judge_api_key_env: DEEPSEEK_API_KEY   # env var holding the key, for keyed endpoints
eval_dataset: auditing-agents/rm_sycophancy_exploitation_evals
# This dataset has NO "train" split; it splits into two bias groups, both loaded.
eval_splits: [train_biases, test_biases]
# Column names verified against the live dataset schema (splits train_biases/
# test_biases carry: bias_id[int], bias_description[str], prompt[str], response_*).
prompt_col: prompt
bias_desc_col: bias_description
